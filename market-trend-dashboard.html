olumns:repeat(6,minmax(140px,1fr));gap:12px;margin-bottom:16px}.metric,.panel,.product-card{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.metric{padding:14px}.metric-label{font-size:12px;color:var(--muted);margin-bottom:8px}.metric-value{font-size:24px;font-weight:800}.metric-note{font-size:12px;color:var(--green);font-weight:800;margin-top:6px}.panel{overflow:hidden;margin-bottom:16px}.panel-head{min-height:54px;padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}.panel-title{margin:0;font-size:17px;font-weight:800}.muted{font-size:12px;color:var(--muted)}.panel-body{padding:16px}.interpret{margin:0 0 16px;padding:13px 14px;border-left:4px solid var(--brand);border-radius:8px;background:var(--soft);color:#12394d;font-size:14px;line-height:1.55}.table-wrap{overflow:auto}table{width:100%;min-width:1180px;border-collapse:collapse;table-layout:auto}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top;line-height:1.45}th{background:#f0f4f8;color:var(--muted);font-size:12px;white-space:nowrap}.row-btn{border:0;background:transparent;color:var(--brand);font-weight:800;border-bottom:1px dashed rgba(23,95,115,.45);font:inherit;cursor:pointer}.tag{display:inline-flex;min-height:24px;align-items:center;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:800;line-height:1.35}.tag-green{background:#dcf7ec;color:var(--green)}.tag-red{background:#fde8e8;color:var(--red)}.tag-orange{background:#fff1d6;color:var(--orange)}.tag-blue{background:#e7efff;color:var(--blue)}.up{color:var(--green);font-weight:800}.down{color:var(--red);font-weight:800}.price-chart{display:grid;grid-template-columns:repeat(11,minmax(84px,1fr));gap:14px;align-items:end;min-height:360px;padding:26px 16px 10px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);overflow-x:auto}.price-band-card{min-width:84px;height:33 <main><section class="topbar"><div><h1>服装品类市场洞察</h1><p class="subtitle">从市场维度、商品结构与新品测款三个层面，辅助品牌完成品类洞察、季度规划和新品评估。</p></div><div class="actions"><button class="btn" id="uploadBtn">上传 Excel</button><button class="btn primary" id="runBtn">运行分析</button><button class="btn" id="exportBtn">导出报告</button></div></section><section class="filters"><div class="field"><label>品类选择</label><select id="categorySelect"><option>夹克</option><option>T恤</option><option>POLO</option><option>通勤裤</option><option>通勤鞋</option><option>衬衫</option><option>羽绒服</option><option>棉服</option></select></div><div class="field"><label>时间周期</label><select id="periodSelect"><option>2025全年</option><option>2026截至当前</option><option>近一年</option><option>近半年</option><option>近30天</option></select></div><div class="field"><label>分析口径</label><select id="scopeSelect"><option>市场大盘</option><option>价格区间</option><option>款式趋势</option><option>商品结构</option><option>新品评估</option></select></div><div class="field"><label>榜单范围</label><select id="rankSelect"><option>TOP50</option><option>TOP100</option><option>TOP300</option><option>全量样本</option></select></div><div class="field"><label>价格区间</label><select id="priceSelect"><option>全部</option><option>50-100</option><option>100-150</option><option>150-200</option><option>200-250</option><option>250-300</option><option>300-350</option><option>350-400</option><option>400-450</option><option>450-500</option><option>500-600</option><option>600+</option></select></div><div class="field"><label>数据来源</label><select id="sourceSelect"><option>本品牌销售数据</option><option>抖音</option><option>天猫</option><option>竞品商品</option><option>商品评论</option><option>AI推荐结果</option><option>全部</option></select></div></section><section class="view active" id="marketView"><div class="metrics" id="marketMetrics"></div><p class="interpret" id="marketInterpret"></p><div class="panel" id="priceBandChartPanel" style="display:none"><div class="panel-head"><h2 class="panel-title">近两年价格带对比</h2><span class="muted">蓝色：2025年3月 TOP50 数量 / 橙色：2026年3月 TOP50 数量 / 黄色：增长率</span></div><div class="price-chart" id="priceBandChart"></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title" id="marketTitle">品牌洞察</h2><span class="muted">点击行查看维度详情</span></div><div class="table-wrap"><table><thead id="marketHead"></thead><tbody id="marketBody"></tbody></table></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">维度详情</h2></div><div class="detail-card" id="dimensionDetail"></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">代表商品 + 自动解读</h2></div><div class="product-grid" id="marketProducts"></div></div></section><section class="view" id="planningView"><div class="metrics" id="planningMetrics"></div><p class="interpret">商品规划基于历史表现、本年销售和未来目标，自动拆解老品贡献、新品缺口和重点款式方向。</p><div class="panel"><div class="panel-head"><h2 class="panel-title" id="planningTitle">销售目标</h2></div><div class="table-wrap"><table><thead id="planningHead"></thead><tbody id="planningBody"></tbody></table></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">结构建议</h2></div><div class="panel-body" id="planningAdvice"></div></div></section><section class="view" id="testingView"><div class="panel"><div class="panel-head"><h2 class="panel-title">新品录入</h2></div><div class="panel-body"><div class="form-grid" id="productForm"></div><div style="margin-top:12px"><button class="btn primary" id="evalBtn">评估新品</button><button class="btn" id="saveDraftBtn">保存草稿</button><button class="btn" id="clearBtn">清空</button></div></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">市场前景评分</h2></div><div class="panel-body" id="scorePanel"></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">测款建议 / 风险提示 / 竞品参考</h2></div><div class="table-wrap"><table><thead><tr><th>模块</th><th>内容</th><th>建议</th></tr></thead><tbody id="testingBody"></tbody></table></div></div></section><section class="view" id="systemView"><div class="panel" <script>
function calcGrowth(c,p){if(!p)return c>0?100:0;return(c-p)/p*100}function calcSupplyDemand(pg,sg){if(sg<0&&pg>0)return'供给过剩，谨慎进入';if(sg-pg>20)return'需求增长快于供给，存在机会';if(pg-sg>20)return'供给增长快于需求，竞争加剧';if(sg>0&&pg<0)return'供给缺口，重点关注';return'供需同步，正常增长'}function calcNewProductNeed(t,o,a){return Math.max(0,Math.ceil((t-o)/a))}function calcNewProductScore(i,m,h){let hot=m.hot.includes(i.style)?25:16,price=m.bands.includes(i.priceBand)?20:12,brand=h.includes(i.style)?15:9,diff=(i.function||'').includes('防晒')?13:9,risk=i.price>600?10:14,target=['夹克','T恤','通勤裤'].includes(i.category)?10:6,total=hot+price+brand+diff+risk+target;return{total,level:total>=85?'强烈建议测款':total>=70?'可以小批量测试':total>=55?'谨慎测试':'不建议',parts:{市场热度:hot,价格适配:price,品牌适配:brand,差异化程度:diff,风险控制:risk,目标匹配:target}}}async function analyzeWithOpenAI(rows,taskType){console.log('OpenAI task',taskType,rows);return rows}const $=id=>document.getElementById(id),toast=$('toast'),labels={brand:'品牌',priceBand:'价格带',style:'款式',function:'功能',fabric:'面料',filling:'填充物',design:'设计',color:'颜色'},base={brand:['优衣库','杰克琼斯','罗蒙','报喜鸟','比音勒芬','海澜之家','九牧王','安踏','探路者','蜀黍家'],priceBand:['50-100','100-150','150-200','200-250','250-300','300-350','350-400','400-450','450-500','500-600','600+'],style:['行政夹克','哈灵顿夹克','底特律夹克','棒球夹克','飞行夹克','麂皮夹克','空调夹克'],function:['速干','凉感','防晒','三防','防水','抗皱','透气','缓震'],fabric:['纯棉','聚酯纤维','锦纶','冰丝','CoolMax','索罗娜','麂皮绒'],filling:['白鸭绒','灰鸭绒','白鹅绒','3M新雪丽','索罗娜棉'],design:['立领','翻领','连帽','多口袋','撞色','拼接'],color:['黑色','藏青','军绿','卡其','灰色','白色']};function makeMarket(){let o={};Object.entries(base).forEach(([k,a])=>o[k]=a.map((n,i)=>{let ps=1800000+i*520000,cs=ps*(1+(i%4-1)*.18+(n.includes('麂皮')?.9:0)+(n==='350-400'?.8:0)),pc=900+i*130,cc=Math.round(pc*(1+(i%5-1)*.12+(n.includes('空调')?.55:0))),pg=(i%5-1)*18,sg=calcGrowth(cc,pc);return{dimensionName:n,category:k==='filling'?(i%2?'羽绒服':'棉服'):'夹克',currentSalesAmount:Math.round(cs),previousSalesAmount:ps,currentSalesCount:cc,previousSalesCount:pc,productCount:24+i*5,productCountGrowth:pg,salesCountGrowth:sg,salesAmountGrowth:calcGrowth(cs,ps),mainPriceBand:i%3===0?'350-400':i%3===1?'150-200':'600+',representativeProduct:n+'代表商品',supplyDemandJudgment:calcSupplyDemand(pg,sg),suggestion:n+'具备观察价值，建议结合本品牌调性评估上新或内容测试。'}}));return o}const marketDimensionData=makeMarket(),chart=[['50-100',2,9],['100-150',4,10],['150-200',5,12],['200-250',7,9],['250-300',13,11],['300-350',5,12],['350-400',2,12],['400-450',4,10],['450-500',1,10],['500-600',6,11],['600+',6,19]],planningData={salesTargets:[{month:'2026-03',category:'夹克',targetSales:15000000,yoy:30,level:'正常'},{month:'2026-04',category:'T恤',targetSales:20000000,yoy:45,level:'激进'}],newProductPlan:[{category:'夹克',targetSales:15000000,oldProductForecast:9750000,avgNewProductSales:1200000,directions:'轻薄 / 防晒 / 空调夹克',bands:'150-200、350-400',points:'不闷、凉感、防晒'}],structureSuggestions:['2026年春夏夹克目标销售额提升明显，老品预计可贡献65%，新品需贡献35%。建议新增轻薄、防晒、空调夹克方向新品。']},newProductEvaluationData={inputFields:{name:'轻薄防晒行政夹克',category:'夹克',price:369,priceBand:'350-400',style:'行政夹克',function:'轻薄,防晒,不闷',fabric:'冰丝',design:'立领,多口袋',color:'藏青'}};let state={module:'market',page:'brand'};function money(v){return v>=10000?(v/10000).toFixed(2)+' 万':Math.round(v)}function pct(v){return(v>0?'+':'')+v.toFixed(1)+'%'}function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}function renderMetrics(id,rows){let sales=rows.reduce((s,r)=>s+r.currentSalesAmount,0),prev=rows.reduce((s,r)=>s+r.previousSalesAmount,0),count=rows.reduce((s,r)=>s+r.currentSalesCount,0),products=rows.reduce((s,r)=>s+r.productCount,0),growth=calcGrowth(sales,prev),opp=rows.filter(r=>r.supplyDemandJudgment.includes('机会')||r.supplyDemandJudgment.includes('缺口')).length,risk=rows.filter(r=>r.supplyDemandJudgment.includes('过剩')||r.supplyDemandJudgment.includes('竞争')).length;$(id).innerHTML=[['本期销售额',money(sales),pct(growth)],['本期销售量',count,'需求侧表现'],['商品数量',products,'供给侧规模'],['同比 / 环比增长',pct(growth),'销售额增速'],['增长机会',opp,'需求快于供给'],['风险提示',risk,'竞争或过剩']].map(c=>'<div class="metric"><div class="metric-label">'+c[0]+'</div><div class="metric-value">'+c[1]+'</div><div class="metric-note">'+c[2]+'</div></div>').join('')}function showView(){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$('marketView').classList.toggle('active',state.module==='market');$('planningView').classList.toggle('active',state.module==='planning');$('testingView').classList.toggle('active',state.module==='testing');$('systemView').classList.toggle('active',state.module==='system');document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.module===state.module&&b.dataset.page===state.page))}function renderChart(){let max=Math.max(...chart.map(r=>r[2]),...chart.map(r=>r[1]));$('priceBandChart').innerHTML=chart.map(r=>{let g=calcGrowth(r[2],r[1]),ph=Math.max(16,r[1]/max*200),ch=Math.max(16,r[2]/max*200);return'<button class="price-band-card '+(r[0]==='350-400'?'active':'')+'"><span class="growth-pill">'+pct(g)+'</span><span class="bar-pair"><span class="bar-mini prev" style="height:'+ph+'px"></span><span class="bar-mini curr" style="height:'+ch+'px"></span></span><span class="price-label">'+r[0]+'</span></button>'}).join('')}function renderMarket(){let page=state.page,data=marketDimensionData[page]||marketDimensionData.brand;$('priceBandChartPanel').style.display=page==='priceBand'?'block':'none';if(page==='priceBand')renderChart();renderMetrics('marketMetrics',data);$('marketTitle').textContent=labels[page]+'洞察';$('marketInterpret').textContent=labels[page]+'维度中，优先关注销量增速高于商品数量增速的方向。';$('marketHead').innerHTML='<tr><th>排名</th><th>维度名称</th><th>所属品类</th><th>本期销售额</th><th>上期销售额</th><th>本期销量</th><th>上期销量</th><th>商品数量</th><th>销售额增速</th><th>销量增速</th><th>商品数量增速</th><th>供需判断</th></tr>';$('marketBody').innerHTML=data.map((r,i)=>'<tr><td>'+(i+1)+'</td><td><button class="row-btn" data-i="'+i+'">'+r.dimensionName+'</button></td><td>'+r.category+'</td><td>'+money(r.currentSalesAmount)+'</td><td>'+money(r.previousSalesAmount)+'</td><td>'+r.currentSalesCount+'</td><td>'+r.previousSalesCount+'</td><td>'+r.productCount+'</td><td class="'+(r.salesAmountGrowth>=0?'up':'down')+'">'+pct(r.salesAmountGrowth)+'</td><td class="'+(r.salesCountGrowth>=0?'up':'down')+'">'+pct(r.salesCountGrowth)+'</td><td>'+pct(r.productCountGrowth)+'</td><td><span class="tag '+(r.supplyDemandJudgment.includes('机会')||r.supplyDemandJudgment.includes('缺口')?'tag-green':r.supplyDemandJudgment.includes('过剩')?'tag-red':'tag-orange')+'">'+r.supplyDemandJudgment+'</span></td></tr>').join('');document.querySelectorAll('#marketBody .row-btn').forEach(btn=>btn.onclick=()=>{renderDetail(data[btn.dataset.i],labels[page]);$('dimensionDetail').scrollIntoView({behavior:'smooth',block:'start'});$('dimensionDetail').classList.add('flash');setTimeout(()=>$('dimensionDetail').classList.remove('flash'),1100)});renderDetail(data[0],labels[page]);$('marketProducts').innerHTML=data.slice(0,3).map(r=>'<div class="product-card"><h3>'+r.representativeProduct+'</h3><div class="chips"><span class="chip">'+r.dimensionName+'</span><span class="chip">'+r.mainPriceBand+'</span></div><p class="muted">'+r.suggestion+'</p></div>').join('')}function renderDetail(r,label){$('dimensionDetail').innerHTML='<h3>'+r.dimensionName+'</h3><div class="chips"><span class="chip">'+label+'</span><span class="chip">'+r.category+'</span><span class="chip">'+r.mainPriceBand+'</span></div><div class="detail-item"><strong>增长情况</strong><p>销售额 '+pct(r.salesAmountGrowth)+'，销量 '+pct(r.salesCountGrowth)+'，商品数 '+pct(r.productCountGrowth)+'。</p></div><div class="detail-item"><strong>供需判断</strong><p>'+r.supplyDemandJudgment+'</p></div><div class="detail-item"><strong>代表商品</strong><p>'+r.representativeProduct+'</p></div>'}function renderPlanning(){renderMetrics('planningMetrics',marketDimensionData.brand);$('planningTitle').textContent=state.page==='newProductPlan'?'新品规划':'销售目标';let rows=state.page==='newProductPl </td><td>观察点击率、转化率、退款率和评论关键词</td></tr><tr><td>风险提示</td><td>防晒和凉感容易产生预期落差</td><td>详情页明确适穿温度和面料成分</td></tr><tr><td>竞品参考</td><td>优衣库哈灵顿夹克 / 罗蒙冰丝行政夹克</td><td>参考功能词组合，不要照搬单爆款逻辑</td></tr>'}function renderSystem(){let t={source:'数据来源',api:'API 设置',export:'导出报告'}[state.page];$('systemTitle').textContent=t;$('systemBody').innerHTML='<div class="detail-item"><strong>'+t+'</strong><p>已预留 Excel 上传、OpenAI API 分析和 Excel/PDF 导出接口。OpenAI 负责关键词提取、属性识别、同义词归一和初步建议；代码负责销售额、增速、供需判断和新品数量规划公式。</p></div>'}function render(){showView();if(state.module==='market')renderMarket();if(state.module==='planning')renderPlanning();if(state.module==='testing')renderTesting();if(state.module==='system')renderSystem()}document.querySelectorAll('[data-module]').forEach(b=>b.onclick=()=>{state.module=b.dataset.module;state.page=b.dataset.page;render()});['categorySelect','periodSelect','scopeSelect','rankSelect','priceSelect','sourceSelect'].forEach(id=>$(id).onchange=()=>{render();showToast('筛选已更新，模拟数据已刷新')});$('runBtn').onclick=async()=>{await analyzeWithOpenAI([],state.module);showToast('模拟分析完成，结果已刷新');render()};$('uploadBtn').onclick=()=>showToast('已预留 Excel 上传入口');$('exportBtn').onclick=()=>showToast('已生成报告，可接入 Excel / PDF 导出');document.addEventListener('click',e=>{if(e.target.id==='evalBtn'){document.querySelectorAll('[data-input]').forEach(i=>newProductEvaluationData.inputFields[i.dataset.input]=i.value);renderTesting();showToast('新品评估已生成')}if(e.target.id==='saveDraftBtn')showToast('草稿已保存到模拟状态');if(e.target.id==='clearBtn'){newProductEvaluationData.inputFields={};renderTesting();showToast('表单已清空')}});render();
