<style>
:root{--bg:#f4f6f8;--line:#dbe3eb;--text:#102033;--muted:#65738a;--brand:#175f73;--soft:#e3f1f5;--green:#009f6b;--red:#d64545;--orange:#d97706;--blue:#2563eb;--shadow:0 14px 32px rgba(16,32,51,.07)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}.sidebar{position:fixed;inset:0 auto 0 0;width:260px;background:#152033;color:#edf4f7;padding:22px 16px;overflow:auto;transition:.18s}.sidebar-toggle{width:100%;height:34px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;margin-bottom:16px}.brand{display:flex;gap:10px;align-items:center;margin-bottom:22px;font-size:18px;font-weight:800}.brand-mark{width:34px;height:34px;border-radius:8px;background:var(--brand);display:grid;place-items:center}.nav-title{margin:20px 8px 8px;color:#9aa9ba;font-size:12px}.nav-item{width:100%;min-height:34px;border:0;border-radius:8px;background:transparent;color:#dce8ef;text-align:left;padding:7px 10px;font:inherit;font-size:14px;cursor:pointer}.nav-item.sub{padding-left:18px;font-size:13px}.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:#fff}body.sidebar-collapsed .sidebar{width:56px;padding:14px 9px;background:transparent;overflow:hidden}body.sidebar-collapsed main{margin-left:56px}body.sidebar-collapsed .sidebar-toggle{width:34px;height:34px;margin:0 auto;background:#152033;box-shadow:0 8px 20px rgba(16,32,51,.16);font-size:0}body.sidebar-collapsed .sidebar-toggle:before{content:"☰";font-size:16px}body.sidebar-collapsed .brand,body.sidebar-collapsed .nav-title,body.sidebar-collapsed .nav-item{display:none}main{margin-left:260px;padding:24px;transition:.18s}.topbar{display:flex;justify-content:space-between;gap:18px;margin-bottom:16px}h1{margin:0 0 8px;font-size:28px}.subtitle{margin:0;color:var(--muted);line-height:1.55}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{height:38px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:0 14px;font-size:14px;cursor:pointer}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:14px;margin-bottom:16px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted);font-weight:800}select,input{height:38px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);font:inherit;padding:0 10px}.view{display:none}.view.active{display:block}.metrics{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px;margin-bottom:16px}.metric,.panel,.product-card{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.metric{padding:16px}.metric-label{font-size:12px;color:var(--muted);margin-bottom:8px}.metric-value{font-size:26px;font-weight:900}.metric-note{font-size:12px;color:var(--green);font-weight:800;margin-top:6px}.interpret{margin:0 0 16px;padding:14px 16px;border-left:4px solid var(--brand);border-radius:8px;background:var(--soft);color:#12394d}.panel{overflow:hidden;margin-bottom:16px}.panel-head{min-height:54px;padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}.panel-title{margin:0;font-size:18px;font-weight:900}.muted{font-size:12px;color:var(--muted)}.table-wrap{overflow:auto}table{width:100%;min-width:1200px;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;white-space:nowrap}th{background:#f0f4f8;color:var(--muted);font-weight:900}.row-btn{border:0;background:transparent;color:var(--brand);font:inherit;font-weight:800;border-bottom:1px dashed rgba(23,95,115,.45);cursor:pointer}.sort-btn{border:0;background:transparent;color:inherit;font:inherit;font-weight:900;display:inline-flex;gap:4px;align-items:center;cursor:pointer}.sort-icon{font-size:10px;color:var(--brand)}.up{color:var(--green);font-weight:900}.down{color:var(--red);font-weight:900}.tag{display:inline-flex;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:800}.tag-blue{background:#e7efff;color:var(--blue)}.tag-green{background:#dcf7ec;color:var(--green)}.tag-orange{background:#fff1d6;color:var(--orange)}.tag-red{background:#fde8e8;color:var(--red)}.pager{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}.page-btn{min-width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--muted);cursor:pointer}.page-btn.active{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:900}.page-btn:disabled{opacity:.5}.grid{display:grid;grid-template-columns:1fr;gap:16px}.detail-card{padding:14px;display:grid;gap:10px}.detail-card h3{margin:0}.detail-item{border:1px solid var(--line);background:#f8fbfd;border-radius:8px;padding:12px}.detail-item p{margin:0;color:var(--muted);line-height:1.55}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{border-radius:7px;background:#eef3f6;padding:4px 7px;font-size:12px;font-weight:700}.product-grid{display:grid;grid-template-columns:repeat(3,minmax(210px,1fr));gap:14px}.product-card{padding:14px}.product-card h3{margin:0 0 8px;font-size:15px}.price-chart{display:grid;grid-template-columns:repeat(11,minmax(86px,1fr));gap:14px;align-items:end;padding:26px 16px 10px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);overflow-x:auto}.price-band-card{height:330px;border:1px solid #8b949e;border-radius:4px 4px 0 0;background:#f7f7f8;display:grid;grid-template-rows:auto 1fr auto;justify-items:center;padding:8px}.growth-pill{border-radius:999px;background:#fff1d6;color:#d97706;font-size:12px;font-weight:900;padding:4px 8px}.bar-pair{align-self:end;height:200px;display:flex;align-items:end;gap:8px}.bar-mini{width:20px;border-radius:8px 8px 0 0}.bar-mini.prev{background:#2563eb}.bar-mini.curr{background:#e17a00}.toast{position:fixed;right:24px;bottom:24px;background:#142033;color:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 16px 38px rgba(16,32,51,.24);opacity:0;transform:translateY(10px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:1180px){.sidebar{display:none}main{margin-left:0}.metrics,.product-grid{grid-template-columns:1fr}.topbar{flex-direction:column}}
</style>

<body class="sidebar-collapsed">
<aside class="sidebar"><button class="sidebar-toggle" id="sidebarToggle">收起目录</button><div class="brand"><div class="brand-mark">M</div><span>市场洞察</span></div><div class="nav-title">市场洞察</div><button class="nav-item sub active" data-module="market" data-page="overview">总览</button><button class="nav-item sub" data-module="market" data-page="brand">品牌</button><button class="nav-item sub" data-module="market" data-page="priceBand">价格带</button><button class="nav-item sub" data-module="market" data-page="style">款式</button><button class="nav-item sub" data-module="market" data-page="function">功能</button><button class="nav-item sub" data-module="market" data-page="fabric">面料</button><button class="nav-item sub" data-module="market" data-page="filling">填充物</button><button class="nav-item sub" data-module="market" data-page="design">设计</button><button class="nav-item sub" data-module="market" data-page="color">颜色</button><div class="nav-title">商品规划</div><button class="nav-item sub" data-module="planning" data-page="salesTargets">销售目标</button><button class="nav-item sub" data-module="planning" data-page="newProductPlan">新品规划</button><div class="nav-title">系统</div><button class="nav-item sub" data-module="system" data-page="source">数据来源</button></aside>
<main><section class="topbar"><div><h1>服装品类市场洞察</h1><p class="subtitle">从市场维度、商品结构与新品测款三个层面，辅助品牌完成品类洞察、季度规划和新品评估。</p></div><div class="actions"><button class="btn" id="uploadBtn">上传 Excel</button><button class="btn primary" id="runBtn">运行分析</button><button class="btn" id="exportBtn">导出报告</button></div></section><section class="filters"><div class="field"><label>品类选择</label><select id="categorySelect"><option>夹克</option><option>T恤</option><option>POLO</option><option>通勤裤</option><option>通勤鞋</option><option>羽绒服</option></select></div><div class="field"><label>时间周期</label><select id="periodSelect"><option>2025全年</option><option>2026截至当前</option><option>近一年</option><option>近半年</option><option>近30天</option></select></div><div class="field"><label>分析口径</label><select id="scopeSelect"><option value="overview">总览</option><option value="brand">品牌</option><option value="priceBand">价格带</option><option value="style">款式</option><option value="function">功能</option><option value="fabric">面料</option><option value="filling">填充物</option><option value="design">设计</option><option value="color">颜色</option></select></div><div class="field"><label>榜单范围</label><select id="rankSelect"><option>TOP50</option><option>TOP100</option><option>TOP300</option><option>全量样本</option></select></div><div class="field"><label>数据来源</label><select id="sourceSelect"><option>本品牌销售数据</option><option>抖音</option><option>天猫</option><option>竞品商品</option><option>商品评论</option><option>AI推荐结果</option><option>全部</option></select></div></section><section class="view active" id="marketView"><div class="metrics" id="marketMetrics"></div><p class="interpret" id="marketInterpret"></p><div class="panel" id="priceBandChartPanel" style="display:none"><div class="panel-head"><h2 class="panel-title">近两年价格带对比</h2><span class="muted">蓝色：2025 TOP50 数量 / 橙色：2026 TOP50 数量 / 黄色：增长率</span></div><div class="price-chart" id="priceBandChart"></div></div><div class="grid"><div class="panel"><div class="panel-head"><h2 class="panel-title" id="marketTitle">商品总览</h2><div class="muted" id="marketPager">点击行查看维度详情</div></div><div class="table-wrap"><table><thead id="marketHead"></thead><tbody id="marketBody"></tbody></table></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">维度详情</h2></div><div class="detail-card" id="dimensionDetail"></div></div></div><div class="panel"><div class="panel-head"><h2 class="panel-title">代表商品 + 自动解读</h2></div><div class="product-grid" id="marketProducts"></div></div></section><section class="view" id="planningView"><div class="metrics" id="planningMetrics"></div><p class="interpret">商品规划基于历史表现、本年销售和未来目标，自动拆解老品贡献、新品缺口和重点款式方向。</p><div class="panel"><div class="panel-head"><h2 class="panel-title" id="planningTitle">销售目标</h2></div><div class="table-wrap"><table><thead id="planningHead"></thead><tbody id="planningBody"></tbody></table></div></div></section><section class="view" id="systemView"><div class="panel"><div class="panel-head"><h2 class="panel-title">数据来源</h2></div><div class="detail-card"><div class="detail-item"><strong>模拟数据源</strong><p>当前看板模拟抖音、天猫、本品牌销售数据、竞品商品和评论关键词，用于演示市场洞察流程。</p></div></div></div></section></main><div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);const categories=['夹克','T恤','POLO','通勤裤','通勤鞋','羽绒服'];const base={brand:['优衣库','杰克琼斯','罗蒙','报喜鸟','比音勒芬','海澜之家','九牧王','安踏','探路者','蜀黍家'],priceBand:['50-100','100-150','150-200','200-250','250-300','300-350','350-400','400-450','450-500','500-600','600+'],style:['行政夹克','哈灵顿夹克','底特律夹克','棒球夹克','飞行夹克','麂皮夹克','空调夹克','工装夹克'],function:['速干','凉感','防晒','三防','防水','抗皱','透气','保暖'],fabric:['纯棉','聚酯纤维','锦纶','冰丝','CoolMax','索罗娜','麂皮绒'],filling:['白鸭绒','灰鸭绒','白鹅绒','3M新雪丽','索罗娜棉'],design:['立领','翻领','连帽','多口袋','撞色','拼接'],color:['黑色','藏青','军绿','卡其','灰色','白色']};const labels={overview:'总览',brand:'品牌',priceBand:'价格带',style:'款式',function:'功能',fabric:'面料',filling:'填充物',design:'设计',color:'颜色'};const state={module:'market',page:'overview',seed:0,overviewPage:1,pagerExpanded:false,sortKey:'currentSalesAmount',sortDir:'desc'};function calcGrowth(c,p){return p?((c-p)/p*100):(c>0?100:0)}function money(v){v=Number(v)||0;return v>=1e8?(v/1e8).toFixed(2)+' 亿':v>=1e4?(v/1e4).toFixed(2)+' 万':Math.round(v).toLocaleString('zh-CN')}function pct(v){v=Number(v)||0;return(v>0?'+':'')+v.toFixed(1)+'%'}function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}function rankLimit(){const v=$('rankSelect').value;return v==='TOP50'?50:v==='TOP100'?100:v==='TOP300'?300:120}function bandOrder(v){return parseInt(v,10)||999}function sortValue(r,k){if(k==='band'||k==='mainPriceBand')return bandOrder(r[k]);return typeof r[k]==='number'?r[k]:String(r[k]||'')}function withSalesRank(rows){return [...rows].sort((a,b)=>b.currentSalesAmount-a.currentSalesAmount).map((r,i)=>({...r,rank:i+1}))}function sortRows(rows){return withSalesRank(rows).sort((a,b)=>{const av=sortValue(a,state.sortKey),bv=sortValue(b,state.sortKey);const n=typeof av==='number'&&typeof bv==='number'?av-bv:String(av).localeCompare(String(bv),'zh-CN');return state.sortDir==='desc'?-n:n})}function sortHeader(label,key){const active=state.sortKey===key;return `<button class="sort-btn" data-sort="${key}">${label} <span class="sort-icon">${active?(state.sortDir==='desc'?'↓':'↑'):'↕'}</span></button>`}function bindSort(){document.querySelectorAll('[data-sort]').forEach(btn=>btn.onclick=()=>{const key=btn.dataset.sort;if(state.sortKey===key)state.sortDir=state.sortDir==='desc'?'asc':'desc';else{state.sortKey=key;state.sortDir=['band','price','currentSalesAmount','currentSalesCount','salesAmountGrowth'].includes(key)?'desc':'asc'}state.overviewPage=1;renderMarket();toast('排序已更新')})}function topProducts(){const category=$('categorySelect').value,period=$('periodSelect').value,rank=$('rankSelect').value,source=$('sourceSelect').value,limit=rankLimit();const sourceBoost=source==='抖音'?1.18:source==='天猫'?1.08:source==='全部'?1.12:source==='本品牌销售数据'?0.96:1.02;const periodBoost=period.includes('2026')?1.14:period.includes('近30天')?.72:period.includes('近半年')?.86:period.includes('近一年')?1.04:1;return Array.from({length:limit},(_,i)=>{const band=base.priceBand[i%base.priceBand.length],price=(parseInt(band,10)||600)+49+(i%7)*8,growth=6+(i%8)*3-(i%11===0?14:0),sales=Math.round(((limit-i)*8200*sourceBoost*periodBoost+(i%9)*13000)*(1+(state.seed%5)*.012)),qty=Math.max(18,Math.round(sales/Math.max(price,59))),trend=base.function[i%base.function.length],name=`${base.brand[i%base.brand.length]} ${trend}${base.style[i%base.style.length]}`;return{name,category,period,rankRange:rank,source,band,price,currentSalesAmount:sales*price,previousSalesAmount:sales*price/(1+growth/100),currentSalesCount:qty,previousSalesCount:Math.round(qty/(1+growth/100)),salesAmountGrowth:growth,keyword:trend,mainPriceBand:band,representativeProduct:name,dimensionName:name,supplyDemandJudgment:growth>=18?'需求快于供给':growth<0?'热度回落':'正常增长'}})}function makeDimension(){const out={};Object.entries(base).forEach(([key,names])=>{out[key]=names.map((name,i)=>{const prev=1800000+i*520000,curr=prev*(1+(i%4-1)*.18+(name.includes('麂皮')?.9:0)+(name==='350-400'?.8:0)),pc=900+i*130,cc=Math.round(pc*(1+(i%5-1)*.12+(name.includes('空调')?.55:0))),pg=(i%5-1)*18,sg=calcGrowth(cc,pc);return{dimensionName:name,category:key==='filling'?(i%2?'羽绒服':'棉服'):'夹克',currentSalesAmount:Math.round(curr),previousSalesAmount:prev,currentSalesCount:cc,previousSalesCount:pc,productCount:24+i*5,productCountGrowth:pg,salesCountGrowth:sg,salesAmountGrowth:calcGrowth(curr,prev),mainPriceBand:i%3===0?'350-400':i%3===1?'150-200':'600+',representativeProduct:name+'代表商品',supplyDemandJudgment:sg-pg>20?'需求增长快于供给，存在机会':pg-sg>20?'供给增长快于需求，竞争加剧':'供需同步，正常增长',suggestion:name+'具备观察价值，建议结合本品牌调性评估上新或内容测试。'}})});return out}const dim=makeDimension();function cards(rows,isProduct=false){const sales=rows.reduce((s,r)=>s+r.currentSalesAmount,0),count=rows.reduce((s,r)=>s+r.currentSalesCount,0),prev=rows.reduce((s,r)=>s+r.previousSalesAmount,0);return[['本期销售额',money(sales),'同比 '+pct(calcGrowth(sales,prev))],['本期销售量',count.toLocaleString('zh-CN'),'需求侧表现'],['商品数量',(isProduct?rows.length:rows.reduce((s,r)=>s+(r.productCount||1),0)).toLocaleString('zh-CN'),'供给侧规模'],['同比 / 环比增长',pct(calcGrowth(sales,prev)),'销售额增速']]}function renderCards(id,rows,isProduct){$(id).innerHTML=cards(rows,isProduct).map(c=>`<div class="metric"><div class="metric-label">${c[0]}</div><div class="metric-value">${c[1]}</div><div class="metric-note">${c[2]}</div></div>`).join('')}function pagerItems(total){if(total<=6||state.pagerExpanded)return Array.from({length:total},(_,i)=>i+1);return [1,2,3,'...',total]}function renderPager(total){state.overviewPage=Math.min(state.overviewPage,total);$('marketPager').className='pager';$('marketPager').innerHTML=`<span class="muted">共 ${total} 页</span>`+pagerItems(total).map(p=>p==='...'?`<button class="page-btn" data-expand="1">...</button>`:`<button class="page-btn ${p===state.overviewPage?'active':''}" data-page="${p}">${p}</button>`).join('');document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{state.overviewPage=Number(b.dataset.page);renderOverview()});document.querySelectorAll('[data-expand]').forEach(b=>b.onclick=()=>{state.pagerExpanded=true;renderOverview()})}function detail(r,label){$('dimensionDetail').innerHTML=`<h3>${r.name||r.dimensionName}</h3><div class="chips"><span class="chip">${label}</span><span class="chip">${r.category}</span><span class="chip">${r.band||r.mainPriceBand}</span></div><div class="detail-item"><strong>销售表现</strong><p>本期销售额 ${money(r.currentSalesAmount)}，本期销量 ${(r.currentSalesCount||0).toLocaleString('zh-CN')}，销售额增速 ${pct(r.salesAmountGrowth)}。</p></div><div class="detail-item"><strong>判断</strong><p>${r.supplyDemandJudgment||r.suggestion}</p></div>`}function renderOverview(){const all=sortRows(topProducts()),total=Math.max(1,Math.ceil(all.length/10)),start=(state.overviewPage-1)*10,page=all.slice(start,start+10);renderPager(total);renderCards('marketMetrics',all,true);$('priceBandChartPanel').style.display='none';$('marketTitle').textContent=`${$('categorySelect').value} ${$('rankSelect').value} 商品总览`;$('marketInterpret').textContent=`当前口径：${$('categorySelect').value} / ${$('periodSelect').value} / ${$('rankSelect').value} / ${$('sourceSelect').value}。排名固定按本期销售额生成，下方每页展示 10 个商品。`;$('marketHead').innerHTML=`<tr><th>排名</th><th>商品名称</th><th>品类</th><th>时间周期</th><th>榜单范围</th><th>数据来源</th><th>${sortHeader('价格区间','band')}</th><th>${sortHeader('商品价格','price')}</th><th>${sortHeader('本期销售额','currentSalesAmount')}</th><th>${sortHeader('本期销量','currentSalesCount')}</th><th>${sortHeader('销售额增速','salesAmountGrowth')}</th><th>趋势关键词</th></tr>`;bindSort();$('marketBody').innerHTML=page.map((r,i)=>`<tr><td>${r.rank}</td><td><button class="row-btn" data-i="${i}">${r.name}</button></td><td>${r.category}</td><td>${r.period}</td><td>${r.rankRange}</td><td>${r.source}</td><td>${r.band}</td><td>¥${r.price}</td><td>${money(r.currentSalesAmount)}</td><td>${r.currentSalesCount.toLocaleString('zh-CN')}</td><td class="${r.salesAmountGrowth>=0?'up':'down'}">${pct(r.salesAmountGrowth)}</td><td><span class="tag tag-blue">${r.keyword}</span></td></tr>`).join('');document.querySelectorAll('#marketBody .row-btn').forEach(b=>b.onclick=()=>detail(page[b.dataset.i],'总览'));detail(page[0],'总览');$('marketProducts').innerHTML=page.slice(0,3).map(r=>`<div class="product-card"><h3>${r.name}</h3><p class="muted">${r.source} / ${r.rankRange} / ${r.band}，可进入款式和关键词复盘。</p></div>`).join('')}function renderChart(){const data=[['50-100',2,9],['100-150',4,10],['150-200',5,12],['200-250',7,9],['250-300',13,11],['300-350',5,12],['350-400',2,12],['400-450',4,10],['450-500',1,10],['500-600',6,11],['600+',6,19]],max=Math.max(...data.map(x=>x[2]));$('priceBandChart').innerHTML=data.map(r=>`<div class="price-band-card"><span class="growth-pill">${pct(calcGrowth(r[2],r[1]))}</span><span class="bar-pair"><span class="bar-mini prev" style="height:${Math.max(16,r[1]/max*200)}px"></span><span class="bar-mini curr" style="height:${Math.max(16,r[2]/max*200)}px"></span></span><span>${r[0]}</span></div>`).join('')}function renderMarket(){if(state.page==='overview'){renderOverview();return}const data=withSalesRank(dim[state.page]||dim.brand);$('marketPager').className='muted';$('marketPager').textContent='点击行查看维度详情';$('priceBandChartPanel').style.display=state.page==='priceBand'?'block':'none';if(state.page==='priceBand')renderChart();renderCards('marketMetrics',data,false);$('marketTitle').textContent=labels[state.page]+'洞察';$('marketInterpret').textContent=`当前口径：${$('categorySelect').value} / ${$('periodSelect').value} / ${$('rankSelect').value} / ${$('sourceSelect').value}。排名按本期销售额生成。`;$('marketHead').innerHTML='<tr><th>排名</th><th>维度名称</th><th>所属品类</th><th>本期销售额</th><th>上期销售额</th><th>本期销量</th><th>上期销量</th><th>商品数量</th><th>销售额增速</th><th>销量增速</th><th>商品数量增速</th><th>供需判断</th></tr>';$('marketBody').innerHTML=data.map((r,i)=>`<tr><td>${r.rank}</td><td><button class="row-btn" data-i="${i}">${r.dimensionName}</button></td><td>${r.category}</td><td>${money(r.currentSalesAmount)}</td><td>${money(r.previousSalesAmount)}</td><td>${r.currentSalesCount}</td><td>${r.previousSalesCount}</td><td>${r.productCount}</td><td class="${r.salesAmountGrowth>=0?'up':'down'}">${pct(r.salesAmountGrowth)}</td><td class="${r.salesCountGrowth>=0?'up':'down'}">${pct(r.salesCountGrowth)}</td><td>${pct(r.productCountGrowth)}</td><td><span class="tag tag-green">${r.supplyDemandJudgment}</span></td></tr>`).join('');document.querySelectorAll('#marketBody .row-btn').forEach(b=>b.onclick=()=>detail(data[b.dataset.i],labels[state.page]));detail(data[0],labels[state.page]);$('marketProducts').innerHTML=data.slice(0,3).map(r=>`<div class="product-card"><h3>${r.representativeProduct}</h3><p class="muted">${r.suggestion}</p></div>`).join('')}function renderPlanning(){renderCards('planningMetrics',dim.brand,false);$('planningHead').innerHTML='<tr><th>月份</th><th>品类</th><th>销售目标</th><th>目标同比</th><th>建议</th></tr>';$('planningBody').innerHTML='<tr><td>2026-03</td><td>夹克</td><td>1500.00 万</td><td class="up">+30%</td><td>放大轻薄、防晒、空调夹克方向</td></tr><tr><td>2026-04</td><td>T恤</td><td>2000.00 万</td><td class="up">+45%</td><td>速干与凉感双线布局</td></tr>'}function showView(){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$('marketView').classList.toggle('active',state.module==='market');$('planningView').classList.toggle('active',state.module==='planning');$('systemView').classList.toggle('active',state.module==='system');document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.module===state.module&&b.dataset.page===state.page))}function render(){showView();if(state.module==='market')renderMarket();if(state.module==='planning')renderPlanning()}document.querySelectorAll('[data-module]').forEach(b=>b.onclick=()=>{state.module=b.dataset.module;state.page=b.dataset.page;if(state.module==='market')$('scopeSelect').value=state.page;render()});$('scopeSelect').onchange=()=>{state.module='market';state.page=$('scopeSelect').value;state.overviewPage=1;state.pagerExpanded=false;render()};['categorySelect','periodSelect','rankSelect','sourceSelect'].forEach(id=>$(id).onchange=()=>{state.seed++;state.overviewPage=1;state.pagerExpanded=false;render();toast('筛选已更新，模拟数据已刷新')});$('sidebarToggle').onclick=()=>{const c=document.body.classList.toggle('sidebar-collapsed');$('sidebarToggle').textContent=c?'展开目录':'收起目录'};$('uploadBtn').onclick=()=>toast('已预留 Excel 上传入口');$('runBtn').onclick=()=>{state.seed++;render();toast('模拟分析完成')};$('exportBtn').onclick=()=>toast('已生成报告，可接入 Excel / PDF 导出');render();
</script>
